# Andes chatbot — paste into /etc/nginx/sites-available/chatbot
# Then: sudo ln -s ... sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
# SSL:  sudo certbot --nginx -d chatbot-staging.andestech.com

server {
    listen 80;
    server_name chatbot-staging.andestech.com;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 130s;
    }
}
