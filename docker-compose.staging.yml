# Staging / internal test — port 8001 → nginx → https://chatbot-staging.andestech.com
# Start: docker compose -f docker-compose.staging.yml up -d --build
# Env:   copy .env.staging.example to .env.staging and fill in values

services:
  api:
    build: .
    image: andeschatbot:latest
    container_name: andeschatbot-staging
    ports:
      - "8001:8000"
    env_file:
      - .env.staging
    environment:
      PORT: "8000"
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    volumes:
      - andes_chat_staging_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  andes_chat_staging_data:
    name: andes_chat_staging_data
