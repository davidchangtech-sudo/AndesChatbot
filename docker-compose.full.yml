# One-click stack: API + Caddy (automatic HTTPS). Use: ./install.sh
services:
  api:
    build: .
    image: andes-chatbot:latest
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      PUBLIC_API_URL: ${PUBLIC_API_URL}
    volumes:
      - ./data:/app/data
      - ./static:/app/static:ro
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CHATBOT_DOMAIN: ${CHATBOT_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
